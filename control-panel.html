<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamo Streaming Hub - لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-card: #1a1a26;
            --bg-card-hover: #22222f;
            --border: #2a2a3a;
            --border-light: #3a3a4f;
            --fg: #e8e8f0;
            --fg-muted: #8888a0;
            --fg-dim: #555570;
            --accent: #e63946;
            --accent-hover: #ff4d5a;
            --accent-glow: rgba(230, 57, 70, 0.3);
            --accent-soft: rgba(230, 57, 70, 0.1);
            --success: #2ecc71;
            --success-bg: rgba(46, 204, 113, 0.1);
            --warning: #f39c12;
            --warning-bg: rgba(243, 156, 18, 0.1);
            --info: #00b4d8;
            --info-bg: rgba(0, 180, 216, 0.1);
            --danger: #e74c3c;
            --danger-bg: rgba(231, 76, 60, 0.1);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-xs: 6px;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--fg);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* === خلفية متحركة === */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(230, 57, 70, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(230, 57, 70, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0;
            pointer-events: none;
        }

        .bg-glow {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(150px);
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        .bg-glow-1 {
            top: -200px;
            right: -100px;
            background: var(--accent);
            animation: floatGlow 12s ease-in-out infinite;
        }

        .bg-glow-2 {
            bottom: -200px;
            left: -100px;
            background: #ff6b35;
            animation: floatGlow 15s ease-in-out infinite reverse;
        }

        @keyframes floatGlow {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 20px) scale(1.1); }
        }

        /* === الشريط الجانبي === */
        .sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: var(--bg-secondary);
            border-left: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            overflow-y: auto;
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .sidebar-logo {
            width: 44px;
            height: 44px;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, var(--accent), #ff6b35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .sidebar-brand {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.3;
        }

        .sidebar-brand span {
            display: block;
            font-size: 11px;
            font-weight: 400;
            color: var(--fg-muted);
            margin-top: 2px;
        }

        .sidebar-nav {
            padding: 16px 12px;
            flex: 1;
        }

        .nav-section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--fg-dim);
            padding: 12px 12px 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: var(--radius-sm);
            color: var(--fg-muted);
            cursor: pointer;
            transition: var(--transition);
            font-size: 14px;
            font-weight: 500;
            position: relative;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--accent-soft);
            color: var(--fg);
        }

        .nav-item.active {
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 600;
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 24px;
            background: var(--accent);
            border-radius: 3px 0 0 3px;
        }

        .nav-item i {
            width: 20px;
            text-align: center;
            font-size: 15px;
        }

        .nav-badge {
            margin-right: auto;
            margin-left: 0;
            background: var(--accent);
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 10px;
            font-family: 'JetBrains Mono', monospace;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .sidebar-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), #ff6b35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #fff;
        }

        .sidebar-user-info {
            flex: 1;
        }

        .sidebar-user-name {
            font-size: 13px;
            font-weight: 600;
        }

        .sidebar-user-role {
            font-size: 11px;
            color: var(--fg-muted);
        }

        /* === المحتوى الرئيسي === */
        .main-content {
            margin-right: 280px;
            min-height: 100vh;
            position: relative;
            z-index: 1;
        }

        /* === الشريط العلوي === */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .menu-toggle {
            display: none;
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--fg);
            cursor: pointer;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .topbar-title {
            font-size: 20px;
            font-weight: 700;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--fg);
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            outline: none;
            transition: var(--transition);
        }

        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .search-box input::placeholder {
            color: var(--fg-dim);
        }

        .search-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--fg-dim);
            font-size: 13px;
        }

        .topbar-btn {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--fg-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 15px;
            transition: var(--transition);
            position: relative;
        }

        .topbar-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .topbar-btn .notif-dot {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 7px;
            height: 7px;
            background: var(--accent);
            border-radius: 50%;
            border: 2px solid var(--bg);
        }

        /* === الصفحات === */
        .page {
            display: none;
            padding: 32px;
            animation: fadeInPage 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeInPage {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* === كروت الإحصائيات === */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            position: relative;
            overflow: hidden;
            transition: var(--transition);
        }

        .stat-card:hover {
            border-color: var(--border-light);
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 3px;
        }

        .stat-card.red::after { background: linear-gradient(90deg, var(--accent), #ff6b35); }
        .stat-card.green::after { background: linear-gradient(90deg, var(--success), #27ae60); }
        .stat-card.blue::after { background: linear-gradient(90deg, var(--info), #0077b6); }
        .stat-card.orange::after { background: linear-gradient(90deg, var(--warning), #e67e22); }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            margin-bottom: 16px;
        }

        .stat-card.red .stat-icon { background: var(--accent-soft); color: var(--accent); }
        .stat-card.green .stat-icon { background: var(--success-bg); color: var(--success); }
        .stat-card.blue .stat-icon { background: var(--info-bg); color: var(--info); }
        .stat-card.orange .stat-icon { background: var(--warning-bg); color: var(--warning); }

        .stat-value {
            font-size: 32px;
            font-weight: 900;
            font-family: 'JetBrains Mono', monospace;
            line-height: 1;
            margin-bottom: 6px;
        }

        .stat-label {
            font-size: 13px;
            color: var(--fg-muted);
            font-weight: 500;
        }

        .stat-change {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 10px;
            padding: 3px 8px;
            border-radius: 20px;
        }

        .stat-change.up {
            background: var(--success-bg);
            color: var(--success);
        }

        .stat-change.down {
            background: var(--danger-bg);
            color: var(--danger);
        }

        /* === الأقسام === */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 12px;
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
        }

        /* === الأزرار === */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-family: 'Cairo', sans-serif;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #ff6b35);
            color: #fff;
            box-shadow: 0 4px 16px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 24px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-card);
            color: var(--fg);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--border-light);
            background: var(--bg-card-hover);
        }

        .btn-danger {
            background: var(--danger-bg);
            color: var(--danger);
            border: 1px solid rgba(231,76,60,0.2);
        }

        .btn-danger:hover {
            background: rgba(231,76,60,0.2);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-xs);
        }

        /* === الجداول === */
        .table-wrapper {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .table-toolbar {
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .table-filters {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-select {
            padding: 8px 14px;
            border-radius: var(--radius-xs);
            border: 1px solid var(--border);
            background: var(--bg-secondary);
            color: var(--fg);
            font-family: 'Cairo', sans-serif;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            transition: var(--transition);
        }

        .filter-select:focus {
            border-color: var(--accent);
        }

        .table-scroll {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: var(--bg-secondary);
        }

        th {
            padding: 14px 16px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--fg-muted);
            text-align: right;
            white-space: nowrap;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 16px;
            font-size: 13px;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr {
            transition: var(--transition);
        }

        tbody tr:hover {
            background: var(--accent-soft);
        }

        .channel-name {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .channel-logo {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-xs);
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
            overflow: hidden;
        }

        .channel-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .channel-info-name {
            font-weight: 600;
            font-size: 13px;
        }

        .channel-info-cat {
            font-size: 11px;
            color: var(--fg-muted);
        }

        /* === البادجات === */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-live {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-offline {
            background: rgba(136,136,160,0.1);
            color: var(--fg-muted);
        }

        .badge-country {
            background: var(--info-bg);
            color: var(--info);
        }

        .badge-category {
            background: var(--warning-bg);
            color: var(--warning);
        }

        .badge-xml {
            background: var(--success-bg);
            color: var(--success);
        }

        .badge-gz {
            background: var(--info-bg);
            color: var(--info);
        }

        /* === المودال === */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: fadeIn 0.2s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
