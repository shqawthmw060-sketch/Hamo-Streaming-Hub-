<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamo Hub - Control Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        :root {
            --bg: #08080d;
            --bg2: #0f0f17;
            --bg3: #16161f;
            --card: #1a1a28;
            --card-h: #20202f;
            --border: #262638;
            --border-l: #36364a;
            --fg: #e6e6f0;
            --muted: #7e7e9a;
            --dim: #4e4e68;
            --accent: #e63946;
            --accent-h: #ff4d5a;
            --accent-g: rgba(230,57,70,0.25);
            --accent-s: rgba(230,57,70,0.08);
            --green: #22c55e;
            --green-s: rgba(34,197,94,0.1);
            --blue: #38bdf8;
            --blue-s: rgba(56,189,248,0.1);
            --orange: #f59e0b;
            --orange-s: rgba(245,158,11,0.1);
            --red: #ef4444;
            --red-s: rgba(239,68,68,0.1);
            --r: 10px;
            --rs: 7px;
            --tr: .25s cubic-bezier(.4,0,.2,1);
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--fg);min-height:100vh;overflow-x:hidden}

        /* خلفية */
        .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;
            background:
                radial-gradient(ellipse 800px 600px at 10% 0%, rgba(230,57,70,0.06), transparent),
                radial-gradient(ellipse 600px 500px at 90% 100%, rgba(255,107,53,0.04), transparent)}
        .bg-dots{position:fixed;inset:0;z-index:0;pointer-events:none;
            background-image:radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size:32px 32px}

        /* الشريط الجانبي */
        .sidebar{position:fixed;right:0;top:0;width:260px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);z-index:100;display:flex;flex-direction:column;transition:var(--tr)}
        .sb-head{padding:20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
        .sb-logo{width:40px;height:40px;border-radius:var(--rs);background:linear-gradient(135deg,var(--accent),#ff6b35);display:flex;align-items:center;justify-content:center;color:#fff;font-size:17px;flex-shrink:0;box-shadow:0 4px 20px var(--accent-g)}
        .sb-brand{font-size:15px;font-weight:700;line-height:1.2}
        .sb-brand small{display:block;font-size:10px;font-weight:400;color:var(--muted);margin-top:2px}
        .sb-nav{padding:14px 10px;flex:1;overflow-y:auto}
        .sb-sec{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);padding:14px 12px 6px}
        .sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--rs);color:var(--muted);cursor:pointer;transition:var(--tr);font-size:13px;font-weight:500;margin-bottom:1px;position:relative}
        .sb-item:hover{background:var(--accent-s);color:var(--fg)}
        .sb-item.on{background:var(--accent-s);color:var(--accent);font-weight:600}
        .sb-item.on::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--accent);border-radius:3px 0 0 3px}
        .sb-item i{width:18px;text-align:center;font-size:14px}
        .sb-badge{margin-right:auto;margin-left:0;background:var(--accent);color:#fff;font-size:9px;font-weight:700;padding:1px 6px;border-radius:10px;font-family:'JetBrains Mono',monospace}
        .sb-foot{padding:14px 18px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
        .sb-avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#ff6b35);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
        .sb-uname{font-size:12px;font-weight:600}
        .sb-urole{font-size:10px;color:var(--muted)}

        /* المحتوى */
        .main{margin-right:260px;min-height:100vh;position:relative;z-index:1}
        .topbar{position:sticky;top:0;z-index:50;background:rgba(8,8,13,0.8);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:14px}
        .tb-r{display:flex;align-items:center;gap:14px}
        .tb-title{font-size:18px;font-weight:700}
        .menu-btn{display:none;width:38px;height:38px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--fg);cursor:pointer;align-items:center;justify-content:center;font-size:16px}
        .tb-l{display:flex;align-items:center;gap:10px}
        .search-box{position:relative;width:280px}
        .search-box input{width:100%;padding:9px 14px 9px 36px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:'Cairo',sans-serif;font-size:12px;outline:none;transition:var(--tr)}
        .search-box input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s)}
        .search-box input::placeholder{color:var(--dim)}
        .search-box i{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--dim);font-size:12px}
        .tb-btn{width:38px;height:38px;border-radius:var(--rs);border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:var(--tr)}
        .tb-btn:hover{border-color:var(--accent);color:var(--accent)}

        /* الصفحات */
        .page{display:none;padding:28px;animation:fadeUp .35s ease}
        .page.on{display:block}
        @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

        /* الإحصائيات */
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:28px}
        .st{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:20px;position:relative;overflow:hidden;transition:var(--tr)}
        .st:hover{border-color:var(--border-l);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
        .st::before{content:'';position:absolute;top:0;right:0;width:100%;height:3px}
        .st.c1::before{background:linear-gradient(90deg,var(--accent),#ff6b35)}
        .st.c2::before{background:linear-gradient(90deg,var(--green),#16a34a)}
        .st.c3::before{background:linear-gradient(90deg,var(--blue),#0284c7)}
        .st.c4::before{background:linear-gradient(90deg,var(--orange),#d97706)}
        .st-icon{width:42px;height:42px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
        .st.c1 .st-icon{background:var(--accent-s);color:var(--accent)}
        .st.c2 .st-icon{background:var(--green-s);color:var(--green)}
        .st.c3 .st-icon{background:var(--blue-s);color:var(--blue)}
        .st.c4 .st-icon{background:var(--orange-s);color:var(--orange)}
        .st-val{font-size:28px;font-weight:900;font-family:'JetBrains Mono',monospace;line-height:1;margin-bottom:4px}
        .st-lbl{font-size:12px;color:var(--muted);font-weight:500}

        /* العناوين */
        .sec-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px}
        .sec-t{font-size:16px;font-weight:700}

        /* الأزرار */
        .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--rs);font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:var(--tr);white-space:nowrap}
        .btn-p{background:linear-gradient(135deg,var(--accent),#ff6b35);color:#fff;box-shadow:0 4px 16px var(--accent-g)}
        .btn-p:hover{transform:translateY(-1px);box-shadow:0 6px 24px var(--accent-g)}
        .btn-s{background:var(--card);color:var(--fg);border:1px solid var(--border)}
        .btn-s:hover{border-color:var(--border-l);background:var(--card-h)}
        .btn-d{background:var(--red-s);color:var(--red);border:1px solid rgba(239,68,68,.15)}
        .btn-d:hover{background:rgba(239,68,68,.18)}
        .btn-sm{padding:6px 12px;font-size:11px}
        .btn-i{width:34px;height:34px;padding:0;display:inline-flex;align-items:center;justify-content:center;border-radius:6px}

        /* الجدول */
        .tw{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
        .tw-bar{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px solid var(--border);flex-wrap:wrap}
        .tw-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .f-sel{padding:7px 12px;border-radius:6px;border:1px solid var(--border);background:var(--bg2);color:var(--fg);font-family:'Cairo',sans-serif;font-size:11px;outline:none;cursor:pointer;transition:var(--tr)}
        .f-sel:focus{border-color:var(--accent)}
        .tw-scroll{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        thead{background:var(--bg2)}
        th{padding:12px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:right;white-space:nowrap;border-bottom:1px solid var(--border)}
        td{padding:12px 14px;font-size:12px;border-bottom:1px solid var(--border);vertical-align:middle}
        tr:last-child td{border-bottom:none}
        tbody tr{transition:var(--tr)}
        tbody tr:hover{background:var(--accent-s)}
        .ch-name{display:flex;align-items:center;gap:10px}
        .ch-logo{width:36px;height:36px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;overflow:hidden}
        .ch-logo img{width:100%;height:100%;object-fit:cover}
        .ch-n{font-weight:600;font-size:12px}
        .ch-cat{font-size:10px;color:var(--muted)}
        .badge{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600}
        .b-live{background:var(--green-s);color:var(--green)}
        .b-off{background:rgba(126,126,154,.1);color:var(--muted)}
        .b-ctry{background:var(--blue-s);color:var(--blue)}
        .b-cat{background:var(--orange-s);color:var(--orange)}
        .b-xml{background:var(--green-s);color:var(--green)}
        .b-gz{background:var(--blue-s);color:var(--blue)}
        .link-txt{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--blue);background:var(--bg2);padding:3px 7px;border-radius:5px;border:1px solid var(--border);max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;cursor:pointer;transition:var(--tr)}
        .link-txt:hover{border-color:var(--blue);background:var(--blue-s)}
        .tw-foot{padding:12px 18px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);font-size:11px;color:var(--muted)}
        .pagi{display:flex;align-items:center;gap:3px}
        .pg-btn{width:30px;height:30px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-family:'JetBrains Mono',monospace;transition:var(--tr)}
        .pg-btn:hover,.pg-btn.on{background:var(--accent);color:#fff;border-color:var(--accent)}

        /* المودال */
        .modal-o{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:1000;align-items:center;justify-content:center;padding:20px}
        .modal-o.show{display:flex}
        .modal{background:var(--card);border:1px solid var(--border);border-radius:var(--r);width:100%;max-width:580px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:modIn .25s ease}
        @keyframes modIn{from{opacity:0;transform:translateY(16px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
        .mod-h{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
        .mod-t{font-size:15px;font-weight:700}
        .mod-x{width:30px;height:30px;border-radius:6px;border:none;background:var(--bg2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:var(--tr)}
        .mod-x:hover{background:var(--red-s);color:var(--red)}
        .mod-b{padding:22px}
        .mod-f{padding:14px 22px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-start;gap:8px}

        /* الفورم */
        .fg{margin-bottom:16px}
        .fl{display:block;font-size:12px;font-weight:600;margin-bottom:6px}
        .fl .req{color:var(--accent)}
        .fi,.ft,.fs{width:100%;padding:9px 12px;border-radius:var(--rs);border:1px solid var(--border);background:var(--bg2);color:var(--fg);font-family:'Cairo',sans-serif;font-size:12px;outline:none;transition:var(--tr)}
        .fi:focus,.ft:focus,.fs:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-s)}
        .ft{resize:vertical;min-height:70px}
        .f-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

        /* التوست */
        .toast-c{position:fixed;top:18px;left:18px;z-index:2000;display:flex;flex-direction:column;gap:8px}
        .toast{padding:12px 18px;border-radius:var(--rs);font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;min-width:280px;box-shadow:0 12px 40px rgba(0,0,0,.4);animation:tIn .35s ease;border:1px solid}
        .toast.ok{background:rgba(34,197,94,.08);border-color:rgba(34,197,94,.25);color:var(--green)}
        .toast.err{background:var(--red-s);border-color:rgba(239,68,68,.25);color:var(--red)}
        .toast.inf{background:var(--blue-s);border-color:rgba(56,189,248,.25);color:var(--blue)}
        @keyframes tIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}

        /* EPG كروت */
        .epg-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
        .epg-c{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;transition:var(--tr);display:flex;align-items:center;gap:12px}
        .epg-c:hover{border-color:var(--border-l);transform:translateY(-1px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
        .epg-fl{width:44px;height:44px;border-radius:var(--rs);background:var(--bg2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
        .epg-info{flex:1;min-width:0}
        .epg-cn{font-size:13px;font-weight:600;margin-bottom:2px}
        .epg-cd{font-size:10px;color:var(--muted);font-family:'JetBrains Mono',monospace}
        .epg-acts{display:flex;flex-direction:column;gap:5px}
        .epg-btn{display:flex;align-items:center;gap:5px;padding:4px 9px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;border:none;transition:var(--tr);font-family:'Cairo',sans-serif}
        .epg-btn.xml{background:var(--green-s);color:var(--green)}
        .epg-btn.gz{background:var(--blue-s);color:var(--blue)}
        .epg-btn:hover{transform:scale(1.04)}

        /* التبويبات */
        .tabs{display:flex;gap:3px;background:var(--bg2);padding:3px;border-radius:var(--rs);border:1px solid var(--border)}
        .tab{padding:7px 14px;border-radius:5px;border:none;background:transparent;color:var(--muted);font-family:'Cairo',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:var(--tr)}
        .tab.on{background:var(--accent);color:#fff}
        .tab:hover:not(.on){color:var(--fg)}

        /* الإعدادات */
        .set-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:22px;margin-bottom:18px}
        .set-t{font-size:14px;font-weight:700;margin-bottom:3px}
        .set-d{font-size:11px;color:var(--muted);margin-bottom:16px}
        .tog-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
        .tog-row:last-child{border-bottom:none}
        .tog-l{font-size:12px;font-weight:500}
        .tog-d{font-size:10px;color:var(--muted);margin-top:1px}
        .tog{width:40px;height:22px;border-radius:11px;background:var(--border);cursor:pointer;position:relative;transition:var(--tr);flex-shrink:0}
        .tog.on{background:var(--accent)}
        .tog::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:#fff;top:3px;right:3px;transition:var(--tr)}
        .tog.on::after{right:21px}

        /* الحالة الفارغة */
        .empty{text-align:center;padding:50px 20px}
        .empty i{font-size:42px;color:var(--dim);margin-bottom:14px}
        .empty h3{font-size:16px;font-weight:700;margin-bottom:6px;color:var(--muted)}
        .empty p{font-size:12px;color:var(--dim);max-width:360px;margin:0 auto 16px}

        /* أوفرلاي الموبايل */
        .sb-over{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
        .sb-over.show{display:block}

        /* سكرولبار */
        ::-webkit-scrollbar{width:5px;height:5px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
        ::-webkit-scrollbar-thumb:hover{background:var(--border-l)}

        /* ريسبونسف */
        @media(max-width:1024px){
            .sidebar{transform:translateX(100%)}
            .sidebar.open{transform:translateX(0);box-shadow:0 20px 60px rgba(0,0,0,.5)}
            .main{margin-right:0}
            .menu-btn{display:flex}
            .search-box{width:200px}
        }
        @media(max-width:640px){
            .page{padding:18px 14px}
            .topbar{padding:10px 14px}
            .search-box{display:none}
            .stats{grid-template-columns:1fr 1fr;gap:10px}
            .st-val{font-size:22px}
            .epg-grid{grid-template-columns:1fr}
            .f-row{grid-template-columns:1fr}
            .tw-bar{flex-direction:column;align-items:stretch}
        }

        /* أنيميشن تحميل */
        .spin{animation:spin 1s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* خط مونو */
        .mono{font-family:'JetBrains Mono',monospace}

        /* تأثير النسخ */
        .copied{animation:copyFlash .4s ease}
        @keyframes copyFlash{0%{background:var(--green-s)}100%{background:transparent}}
    </style>
</head>
<body>
    <div class="bg-mesh"></div>
    <div class="bg-dots"></div>
    <div class="sb-over" id="sbOver" onclick="toggleSB()"></div>

    <!-- الشريط الجانبي -->
    <aside class="sidebar" id="sidebar">
        <div class="sb-head">
            <div class="sb-logo"><i class="fas fa-play"></i></div>
            <div class="sb-brand">Hamo Hub<small>Control Panel</small></div>
        </div>
        <nav class="sb-nav">
            <div class="sb-sec">الرئيسية</div>
            <div class="sb-item on" onclick="go('dash',this)"><i class="fas fa-chart-pie"></i>نظرة عامة</div>
            <div class="sb-sec">إدارة المحتوى</div>
            <div class="sb-item" onclick="go('ch',this)"><i class="fas fa-tv"></i>القنوات<span class="sb-badge" id="chBadge">0</span></div>
            <div class="sb-item" onclick="go('epg',this)"><i class="fas fa-calendar-alt"></i>ملفات EPG<span class="sb-badge">75</span></div>
            <div class="sb-sec">النظام</div>
            <div class="sb-item" onclick="go('io',this)"><i class="fas fa-exchange-alt"></i>استيراد / تصدير</div>
            <div class="sb-item" onclick="go('set',this)"><i class="fas fa-cog"></i>الإعدادات</div>
            <div class="sb-item" onclick="wi
