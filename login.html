<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Hamo Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="custom.css">
</head>
<body class="bg-gradient-to-br from-gray-900 via-black to-gray-900 text-white min-h-screen">
    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-purple-500/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="text-2xl font-bold bg-gradient-to-r from-purple-500 to-pink-500 bg-clip-text text-transparent">
                    🎬 Hamo Streaming
                </a>
                <div class="flex gap-4">
                    <a href="index.html" class="hover:text-purple-400 transition">الرئيسية</a>
                    <a href="plans.html" class="hover:text-purple-400 transition">الباقات</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Login Container -->
    <div class="min-h-screen flex items-center justify-center pt-20 pb-12 px-4">
        <div class="w-full max-w-md">
            <!-- Animated Background -->
            <div class="absolute inset-0 bg-gradient-to-r from-purple-600/10 to-pink-600/10 rounded-2xl blur-3xl -z-10"></div>

            <div class="bg-gray-800/50 backdrop-blur-xl border border-purple-500/20 rounded-2xl p-8 shadow-2xl">
                <!-- Header -->
                <div class="text-center mb-8">
                    <h1 class="text-3xl font-bold mb-2">مرحباً بك</h1>
                    <p class="text-gray-400">تسجيل الدخول إلى حسابك</p>
                </div>

                <!-- Login Form -->
                <form id="loginForm" class="space-y-6">
                    <!-- Email Input -->
                    <div>
                        <label for="email" class="block text-sm font-medium mb-2">البريد الإلكتروني</label>
                        <div class="relative">
                            <span class="absolute right-3 top-3 text-purple-400">✉️</span>
                            <input
                                type="email"
                                id="email"
                                placeholder="your@email.com"
                                class="w-full bg-gray-700/50 border border-purple-500/30 rounded-lg py-3 pr-10 pl-4 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition"
                                required
                            >
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div>
                        <label for="password" class="block text-sm font-medium mb-2">كلمة المرور</label>
                        <div class="relative">
                            <span class="absolute right-3 top-3 text-purple-400">🔒</span>
                            <input
                                type="password"
                                id="password"
                                placeholder="••••••••"
                                class="w-full bg-gray-700/50 border border-purple-500/30 rounded-lg py-3 pr-10 pl-4 text-white placeholder-gray-500 focus:outline-none focus:border-purple-500 focus:ring-2 focus:ring-purple-500/20 transition"
                                required
                            >
                            <button
                                type="button"
                                class="absolute left-3 top-3 text-gray-400 hover:text-purple-400 transition"
                                onclick="togglePassword()"
                            >
                                👁️
                            </button>
                        </div>
                    </div>

                    <!-- Remember Me & Forgot Password -->
                    <div class="flex justify-between items-center text-sm">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input type="checkbox" id="rememberMe" class="w-4 h-4 rounded bg-gray-700 border-purple-500/30 cursor-pointer">
                            <span class="text-gray-400">تذكرني</span>
                        </label>
                        <a href="#" class="text-purple-400 hover:text-purple-300 transition">هل نسيت كلمة المرور؟</a>
                    </div>

                    <!-- Login Button -->
                    <button
                        type="submit"
                        class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-700 hover:to-pink-700 text-white font-bold py-3 rounded-lg transition transform hover:scale-105 shadow-lg shadow-purple-500/50"
                    >
                        دخول
                    </button>

                    <!-- Divider -->
                    <div class="relative my-6">
                        <div class="absolute inset-0 flex items-center">
                            <div class="w-full border-t border-gray-600"></div>
                        </div>
                        <div class="relative flex justify-center text-sm">
                            <span class="px-2 bg-gray-800/50 text-gray-400">أو</span>
                        </div>
                    </div>

                    <!-- Social Login -->
                    <div class="space-y-3">
                        <button type="button" class="w-full bg-gray-700/50 hover:bg-gray-600/50 border border-gray-600/50 rounded-lg py-3 transition flex items-center justify-center gap-2">
                            <span>👨‍💻</span>
                            <span>Google</span>
                        </button>
                        <button type="button" class="w-full bg-gray-700/50 hover:bg-gray-600/50 border border-gray-600/50 rounded-lg py-3 transition flex items-center justify-center gap-2">
                            <span>f</span>
                            <span>Facebook</span>
                        </button>
                    </div>
                </form>

                <!-- Signup Link -->
                <p class="text-center mt-6 text-gray-400">
                    ليس لديك حساب؟ 
                    <a href="#" class="text-purple-400 hover:text-purple-300 font-semibold transition">إنشاء حساب</a>
                </p>

                <!-- Error Message -->
                <div id="errorMessage" class="mt-4 p-4 bg-red-500/10 border border-red-500/30 rounded-lg text-red-400 hidden"></div>

                <!-- Success Message -->
                <div id="successMessage" class="mt-4 p-4 bg-green-500/10 border border-green-500/30 rounded-lg text-green-400 hidden"></div>
            </div>

            <!-- Security Info -->
            <div class="mt-8 text-center text-sm text-gray-500">
                <p>🔐 بيانات آمنة - نحن نحمي خصوصيتك</p>
            </div>
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm hidden flex items-center justify-center z-50">
        <div class="text-center">
            <div class="inline-block animate-spin">
                <div class="w-12 h-12 border-4 border-purple-500/20 border-t-purple-500 rounded-full"></div>
            </div>
            <p class="mt-4 text-purple-400">جاري تسجيل الدخول...</p>
        </div>
    </div>

    <script src="auth.js"></script>
</body>
</html>
