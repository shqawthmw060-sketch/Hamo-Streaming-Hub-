<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطط الاشتراك</title>
    <style>
        body { font-family: Arial, sans-serif; direction: rtl; }
        .plan { border: 1px solid #ccc; margin: 15px; padding: 20px; border-radius: 5px; }
        h2 { color: #333; }
        .price { font-size: 24px; color: #007BFF; }
    </style>
</head>
<body>
    <h1>خطط الاشتراك</h1>
    <div class="plan">
        <h2>الخطة المجانية</h2>
        <div class="price">$0 / شهريًا</div>
        <p>تجربة أساسية مع ميزات محدودة.</p>
    </div>
    <div class="plan">
        <h2>الخطة الأساسية</h2>
        <div class="price">$5 / شهريًا</div>
        <p>الوصول إلى معظم الميزات الأساسية.</p>
    </div>
    <div class="plan">
        <h2>الخطة المميزة</h2>
        <div class="price">$15 / شهريًا</div>
        <p>الوصول الكامل إلى جميع الميزات.</p>
    </div>
</body>
</html>
